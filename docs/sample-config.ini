; Switch WireGuard sample configuration
; This is sufficient to exercise the current config parser and WireGuard cryptographic preflight path.
; Replace the key and endpoint values with your real peer configuration when a real handshake backend lands.

[runtime]
active_profile = default
runtime_flags = dns_through_tunnel

[app_policy.default]
desired_profile = default
requested_flags = 
allow_local_network_bypass = false
require_tunnel_for_default_traffic = true
prefer_tunnel_dns = true
allow_direct_internet_fallback = false

[app_policy.moonlight-switch]
client_name = Moonlight-Switch
integration_tag = moonlight-switch
desired_profile = default
requested_flags = dns_through_tunnel
allow_local_network_bypass = false
require_tunnel_for_default_traffic = false
prefer_tunnel_dns = true
allow_direct_internet_fallback = true

[profile.default]
private_key = oP1+wj0r1k+4bqyOp9QKF77GZaPGTzlvzCm/44vR63E=
; public_key is the remote peer or server public key, not the public key derived from private_key.
public_key = Kx666j8fvAMhWmqVQsmtmXeljBNvf0vB1SEHaUa2iAI=
preshared_key = VVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVU=
endpoint_host = vpn.example.test
endpoint_port = 51820
allowed_ips = 0.0.0.0/0, ::/0
address = 10.0.0.2/32
dns = 1.1.1.1, 1.0.0.1
persistent_keepalive = 25
autostart = false
transparent_mode = false
kill_switch = false