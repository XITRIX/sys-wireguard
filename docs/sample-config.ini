; Switch WireGuard sample configuration
; This is sufficient to exercise the current config parser and WireGuard preflight path.
; Replace the key and endpoint values with your real peer configuration when a real handshake backend lands.

[runtime]
active_profile = default
runtime_flags = dns_through_tunnel

[profile.default]
private_key = AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8=
public_key = ICEiIyQlJicoKSorLC0uLzAxMjM0NTY3ODk6Ozw9Pj8=
